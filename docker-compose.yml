name: defect-analyzer

services:
    app:
        build:
            args:
                user: developer
                uid: 1000
            context: .
            dockerfile: ./docker/php/Dockerfile
        container_name: defect-app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
            - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
        depends_on:
            mysql:
                condition: service_healthy
        networks:
            - defect-network

    nginx:
        image: nginx:alpine
        container_name: defect-nginx
        restart: unless-stopped
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - defect-network

    mysql:
        image: mysql:8.0
        container_name: defect-mysql
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: defect_analyzer
            MYSQL_USER: defect
            MYSQL_PASSWORD: secret
            MYSQL_ROOT_PASSWORD: root
        ports:
            - "3308:3306"
        volumes:
            - db-data:/var/lib/mysql
            - ./docker/mysql/my.cnf:/etc/mysql/my.cnf
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - defect-network

networks:
    defect-network:
        name: defect-network
        driver: bridge

volumes:
    db-data:
        name: defect-analyzer-db-data
